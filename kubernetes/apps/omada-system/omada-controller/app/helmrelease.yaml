---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app omada
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
    timeout: 5m
  values:
    controllers:
      omada:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/mbentley/omada-controller
              tag: 6.2@sha256:e7e44ee8f230039a331ac9ca70d91c9a4e3f9acecdbdbead7957a97d7356cc82
            env:
              MANAGE_HTTP_PORT: "8088"
              MANAGE_HTTPS_PORT: &manage-https "8043"
              PORTAL_HTTP_PORT: "8088"
              PORTAL_HTTPS_PORT: "8843"
              PORT_APP_DISCOVERY: "27001"
              PORT_OLT: "19810"
              PORT_DISCOVERY: "29810"
              PORT_MANAGER_V1: "29811"
              PORT_ADOPT_V1: "29812"
              PORT_UPGRADE_V1: "29813"
              PORT_MANAGER_V2: "29814"
              PORT_TRANSFER_V2: "29815"
              PORT_RTTY: "29816"
              PORT_DEVICE_MONITOR: "29817"
              TZ: America/New_York
            # probes:
            #   liveness: &probes
            #     enabled: true
            #     custom: true
            #     spec:
            #       httpGet:
            #         path: /ping
            #         port: *port
            #       initialDelaySeconds: 0
            #       periodSeconds: 10
            #       timeoutSeconds: 1
            #       failureThreshold: 3
            #   readiness: *probes
            securityContext: {}
              # allowPrivilegeEscalation: true
              # readOnlyRootFilesystem: false
              # capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 100m
              limits:
                memory: 4Gi
    defaultPodOptions:
      annotations:
        k8s.v1.cni.cncf.io/networks: |-
          [{
            "name": "home",
            "namespace": "kube-system",
            "ips": ["10.0.10.44/24"],
            "mac": "7a:f1:d5:a4:99:e1"
          },{
            "name": "mgmt",
            "namespace": "kube-system",
            "ips": ["192.168.88.154/24"],
            "mac": "76:61:b0:81:85:c5"
          }]
      securityContext: {}
        # runAsNonRoot: false
        # runAsUser: 508
        # runAsGroup: 508
        # fsGroup: 508
        # fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          https:
            port: 443
            protocol: HTTPS
            targetPort: *manage-https
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - group: gateway.envoyproxy.io
                kind: Backend
                name: tls-backend
    persistence:
      data:
        existingClaim: omada
        globalMounts:
          - path: /opt/tplink/EAPController/data
      # certs:
      #   type: secret
      #   name: network/casadewade-com-production-tls
