---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: llmkube
spec:
  chart:
    spec:
      chart: llmkube
      version: 0.8.27
      sourceRef:
        kind: HelmRepository
        name: llmkube
        namespace: llmkube
  interval: 1h
  values:
    namespace: llmkube
    networkPolicies:
      enabled: false
    # Enable full Prometheus integration
    prometheus:
      serviceMonitor:
        enabled: true
        interval: 30s
        namespace: "" # Deploy in same namespace as release
        additionalLabels:
          prometheus: kube-prometheus-stack-prometheus
      prometheusRule:
        enabled: true
        namespace: o11y
        additionalLabels:
          prometheus: kube-prometheus-stack-prometheus
          role: alert-rules
        rules:
          gpu:
            enabled: true
            highUtilizationThreshold: 85
            highTemperatureThreshold: 85
            memoryPressureThreshold: 90
            powerLimitThreshold: 250
          inference:
            enabled: true
