apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: qwen-agentworld-35b-service
spec:
  modelRef: qwen-agentworld-35b
  replicas: 1
  image: ghcr.io/ggml-org/llama.cpp:server-vulkan
  # Native PodAffinity targeting the controller
  affinity:
    podAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - llmkube
          topologyKey: "kubernetes.io/hostname"
  args:
    - "-c"
    - "131072"
    - "-fa"
  resources:
    gpu: 1
    cpu: "2"
    memory: "4Gi"
    hostMemory: "40Gi"
    gpuMemory: "24Gi"
  endpoint:
    port: 8080
    type: ClusterIP
