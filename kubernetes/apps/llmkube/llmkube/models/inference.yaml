apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: qwen-agentworld-35b-service
spec:
  modelRef: qwen-agentworld-35b
  replicas: 1
  image: ghcr.io/ggml-org/llama.cpp:server-vulkan
  args:
    - "-fit"
    - "off"
    # 2. Context Window: 8192 tokens.
    # You have the RAM for it, and this provides a massive memory for complex prompts.
    - "-c"
    - "8192"
    - "-t"
    - "8"
  resources:
    gpu: 1
    cpu: "8"
    memory: "8Gi"
    hostMemory: "64Gi"
    gpuMemory: "8Gi"
  endpoint:
    port: 8080
    type: ClusterIP
