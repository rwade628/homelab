apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: qwen-agentworld-35b-service
spec:
  modelRef: qwen-agentworld-35b
  replicas: 1
  image: ghcr.io/ggml-org/llama.cpp:server-vulkan
  # Native PodAffinity targeting the controller
  affinity:
    podAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - llmkube-controller-manager
          # Tell the scheduler to look in the controller's namespace
          namespaces:
            - llmkube
          topologyKey: "kubernetes.io/hostname"
  args:
    - "-fit"
    - "off"
    - "-c"
    - "131072"
    - "-fa"
    - "-t"
    - "8"
  resources:
    gpu: 1
    cpu: "8"
    memory: "8Gi"
    hostMemory: "60Gi"
    gpuMemory: "8Gi"
  endpoint:
    port: 8080
    type: ClusterIP
