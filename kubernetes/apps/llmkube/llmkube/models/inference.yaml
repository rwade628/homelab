apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: qwen-service
spec:
  modelRef: qwen-35b-a3b-mtp
  replicas: 1
  image: ghcr.io/rwade628/llama-cpp:vulkan
  # Native PodAffinity targeting the controller
  affinity:
    podAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - llmkube
          topologyKey: "kubernetes.io/hostname"
  contextSize: 262144
  flashAttention: false
  cacheTypeK: q8_0
  cacheTypeV: q8_0
  batchSize: 4096
  args:
    - "-fit"
    - "on"
    - "-n"
    - "262144"
    - "-np"
    - "1"
    - "--ubatch-size"
    - "1024"
    - "-ctkd"
    - "q8_0"
    - "-ctvd"
    - "q8_0"
    - "--spec-type"
    - "draft-mtp"
    - "--spec-draft-n-max"
    - "2"
    - "--chat-template-kwargs"
    - '{"preserve_thinking":true}'
    - "--temp"
    - "0.6"
    - "--top-p"
    - "0.95"
    - "--top-k"
    - "20"
    - "--min-p"
    - "0"
    - "--presence-penalty"
    - "0.0"
    - "--ctx-checkpoints"
    - "0"
    - "--repeat-penalty"
    - "1.0"
  resources:
    gpu: 1
    cpu: "2"
    memory: "4Gi"
  endpoint:
    port: 8080
    type: ClusterIP
