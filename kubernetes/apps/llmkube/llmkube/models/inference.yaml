apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: qwen-service
spec:
  modelRef: qwen-27b-mtp
  replicas: 1
  image: ghcr.io/ggml-org/llama.cpp:server-vulkan
  # Native PodAffinity targeting the controller
  affinity:
    podAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - llmkube
          topologyKey: "kubernetes.io/hostname"
  args:
    - "-c"
    - "8192"
    - "-fa"
    - "on"
    - "--spec-type"
    - "draft-mtp"
    - "--spect-draft-n-max"
    - "2"
  resources:
    gpu: 1
    cpu: "2"
    memory: "4Gi"
    hostMemory: "50Gi"
    gpuMemory: "8Gi"
  endpoint:
    port: 8080
    type: ClusterIP
