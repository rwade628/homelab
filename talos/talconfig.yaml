# yaml-language-server: $schema=https://raw.githubusercontent.com/budimanjojo/talhelper/master/pkg/config/schemas/talconfig.json
---
# renovate: datasource=docker depName=ghcr.io/siderolabs/installer
talosVersion: v1.13.4
# renovate: datasource=docker depName=ghcr.io/siderolabs/kubelet
kubernetesVersion: v1.36.1

clusterName: "homelab"
endpoint: https://10.0.10.245:6443
clusterPodNets:
  - "10.69.0.0/16"
clusterSvcNets:
  - "10.96.0.0/16"

additionalApiServerCertSans: &sans
  - 127.0.0.1
  - "10.0.10.245"
additionalMachineCertSans: *sans

# Disable built-in Flannel to use Cilium
cniConfig:
  name: none

nodes:
  - hostname: "ser8a"
    ipAddress: "10.0.10.86"
    installDiskSelector:
      model: "CT1000P3PSSD8"
    talosImageURL: factory.talos.dev/installer/9c1d1b442d73f96dcd04e81463eb20000ab014062d22e1b083e1773336bc1dd5
    nodeLabels:
      feature.node.kubernetes.io/amd-gpu: "true"
      topology.kubernetes.io/zone: m
    networkInterfaces:
      - interface: bond0
        bond:
          deviceSelectors:
            - hardwareAddr: 70:70:fc:07:d0:7b
          mode: active-backup
        mtu: 9000
        dhcp: true
        vip:
          ip: "10.0.10.245"
        vlans:
          - vlanId: 30
            mtu: 9000
          - vlanId: 50
            mtu: 9000
          - vlanId: 99
            mtu: 9000
    controlPlane: true
  - hostname: "ser8b"
    ipAddress: "10.0.10.88"
    installDiskSelector:
      model: "CT1000P3PSSD8"
    talosImageURL: factory.talos.dev/installer/9c1d1b442d73f96dcd04e81463eb20000ab014062d22e1b083e1773336bc1dd5
    nodeLabels:
      feature.node.kubernetes.io/amd-gpu: "true"
      topology.kubernetes.io/zone: m
    networkInterfaces:
      - interface: bond0
        bond:
          deviceSelectors:
            - hardwareAddr: 70:70:fc:07:d2:21
          mode: active-backup
        mtu: 9000
        dhcp: true
        vip:
          ip: "10.0.10.245"
        vlans:
          - vlanId: 30
            mtu: 9000
          - vlanId: 50
            mtu: 9000
          - vlanId: 99
            mtu: 9000
    controlPlane: true
  - hostname: "ser8c"
    ipAddress: "10.0.10.87"
    installDiskSelector:
      model: "CT1000P3PSSD8"
    talosImageURL: factory.talos.dev/installer/9c1d1b442d73f96dcd04e81463eb20000ab014062d22e1b083e1773336bc1dd5
    nodeLabels:
      feature.node.kubernetes.io/amd-gpu: "true"
      topology.kubernetes.io/zone: m
    networkInterfaces:
      - interface: bond0
        bond:
          deviceSelectors:
            - hardwareAddr: 70:70:fc:07:d0:d4
          mode: active-backup
        mtu: 9000
        dhcp: true
        vip:
          ip: "10.0.10.245"
        vlans:
          - vlanId: 30
            mtu: 9000
          - vlanId: 50
            mtu: 9000
          - vlanId: 99
            mtu: 9000
    controlPlane: true

# Global patches
patches:
  - "@./patches/global/machine-features.yaml"
  - "@./patches/global/machine-files.yaml"
  - "@./patches/global/machine-kubelet.yaml"
  - "@./patches/global/machine-labels.yaml"
  - "@./patches/global/machine-sysctls.yaml"
  - "@./patches/global/machine-time.yaml"
  - "@./patches/global/machine-udev.yaml"
  - "@./patches/global/openebs-local.yaml"

# Controller patches
controlPlane:
  patches:
    # - "@./patches/controller/admission-controller-patch.yaml"
    - "@./patches/controller/cluster.yaml"
    - "@./patches/controller/api-access.yaml"
